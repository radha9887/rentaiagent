# /etc/nginx/sites-available/rentaiagent
# Main site — reverse proxy to Next.js on port 3100
server {
    listen 80;
    server_name rentaiagent.io www.rentaiagent.io;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# API — reverse proxy to FastAPI on port 8100
server {
    listen 80;
    server_name api.rentaiagent.io;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE support for MCP
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
